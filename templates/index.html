<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>NanoSplit</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .form-shell {
      max-width: 760px;
    }
  </style>
</head>
<body class="bg-light">
<div class="container py-4 form-shell">
  <h1>NanoSplit</h1>
  <div class="card p-4">
    <form action="{{ url_for('create_job') }}" method="post" enctype="multipart/form-data">
      <div class="mb-3">
        <label class="form-label">FASTQ / FASTQ.GZ file</label>
        <input class="form-control" type="file" name="fastq_file" required>
      </div>
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Barcode length</label>
          <input class="form-control" type="number" name="barcode_length" min="1" required>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Barcode mode</label>
          <select class="form-select" name="barcode_mode">
            <option value="one">One end</option>
            <option value="both">Both ends</option>
          </select>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Optional named barcode list (comma-separated per line)</label>
        <textarea class="form-control" name="named_barcodes" rows="5" placeholder="sampleA,ACTGACTG
sampleB,TGCATGCA
samplePair,ACTGACTG,TGCATGCA"></textarea>
      </div>
      <button class="btn btn-primary">Create job</button>
    </form>
  </div>
</div>
</body>
</html>
