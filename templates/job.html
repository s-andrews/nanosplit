<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>NanoSplit Job {{ job.job_id }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
  <style>
    .chart-wrap {
      height: 360px;
      position: relative;
      width: 100%;
    }

    .sequence-text {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    .selection-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: end;
    }

    .selection-controls .form-field {
      flex: 0 1 10rem;
    }

    .selected-count {
      color: #495057;
      font-size: 0.95rem;
      line-height: 2.375rem;
    }
  </style>
</head>
<body>
<div class="container py-3">
  <h2>Job {{ job.job_id }}</h2>
  <p><strong>Input:</strong> {{ job.fastq_name }} | Barcode length: {{ job.barcode_length }} | Mode: {{ job.barcode_mode }}</p>

  <div class="card p-3 mb-3">
    <h4>Step 3: Read length distribution</h4>
    <div class="chart-wrap"><canvas id="lenChart"></canvas></div>
    <div class="row mt-3">
      <div class="col"><input id="minLen" class="form-control" type="number" placeholder="min length"></div>
      <div class="col"><input id="maxLen" class="form-control" type="number" placeholder="max length"></div>
      <div class="col"><button class="btn btn-primary" onclick="submitLen()">Submit length filter</button></div>
    </div>
  </div>

  <div class="card p-3 mb-3">
    <h4>Step 4: Barcode abundance at read start</h4>
    <div class="chart-wrap"><canvas id="bcChart"></canvas></div>
    <div class="mt-2">
      <div class="selection-controls">
        <div class="form-field">
          <label class="form-label mb-1">Min count</label>
          <input id="minCount" type="number" class="form-control" value="5">
        </div>
        <div class="form-field">
          <label class="form-label mb-1">Max bars</label>
          <input id="maxBars" type="number" class="form-control" value="30">
        </div>
        <button class="btn btn-primary" onclick="renderStep4()">Apply filter</button>
      </div>
      <div class="d-flex flex-wrap gap-3 align-items-center mt-2">
        <button class="btn btn-success" onclick="submitStep4()">Use selected barcodes</button>
        <span id="step4SelectedCount" class="selected-count">0 selected</span>
      </div>
    </div>
  </div>

  <div class="card p-3 mb-3">
    <h4>Step 5: Final barcode/pair quantitation</h4>
    <div class="selection-controls mb-2">
      <div class="form-field">
        <label class="form-label mb-1">Min count</label>
        <input id="finalMinCount" type="number" class="form-control" value="1">
      </div>
      <button class="btn btn-primary" onclick="renderStep5()">Apply filter</button>
    </div>
    <div class="chart-wrap"><canvas id="finalChart"></canvas></div>
    <div class="d-flex flex-wrap gap-3 align-items-center mt-2">
      <button class="btn btn-success" onclick="submitStep5()">Split reads using selected final keys</button>
      <span id="step5SelectedCount" class="selected-count">0 selected</span>
    </div>
  </div>

  <div class="card p-3">
    <h4>Step 6: Downloads</h4>
    <div id="downloads"></div>
  </div>
</div>
<script>
const JOB_ID = "{{ job.job_id }}";
let lenChart, bcChart, finalChart;
let step4Data = null;
let finalData = null;
let pollTimer = null;
let selectedStep4 = new Set();
let selectedStep5 = new Set();
const SEQUENCE_FONT = 'ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace';
const SELECTED_FORWARD = 'rgba(54,162,235,0.7)';
const SELECTED_REVERSE = 'rgba(255,99,132,0.7)';
const SELECTED_FINAL = 'rgba(54,162,235,0.7)';
const DESELECTED_BAR = 'rgba(173,181,189,0.35)';

const STEP_LOADERS = {
  lengths: loadLengths,
  filter_barcodes: loadStep4,
  final_quant: loadStep5,
  split: loadDownloads,
};

async function fetchStatus() {
  return (await fetch(`/api/job/${JOB_ID}/status`, {cache: 'no-store'})).json();
}

function firstActiveStep(status) {
  return Object.keys(STEP_LOADERS).find(step => ['queued', 'running'].includes(status[step]));
}

async function renderCompleted(status) {
  for (const [step, load] of Object.entries(STEP_LOADERS)) {
    if (status[step] === 'done') await load();
  }
}

function watchStep(step) {
  if (pollTimer) clearInterval(pollTimer);
  if (!step) return;

  const check = async () => {
    const status = await fetchStatus();
    if (status[step] === 'done') {
      clearInterval(pollTimer);
      pollTimer = null;
      window.location.reload();
    }
  };

  pollTimer = setInterval(check, 2000);
  check();
}

function histogram(values, bin=100) {
  const m = Math.max(...values);
  const bins = new Array(Math.ceil(m/bin)+1).fill(0);
  for (const v of values) bins[Math.floor(v/bin)]++;
  return {labels: bins.map((_,i)=>`${i*bin}`), counts: bins};
}

function sequenceAxisWidth(labels) {
  const longest = labels.reduce((max, label) => Math.max(max, String(label).length), 0);
  return Math.min(520, Math.max(180, longest * 8 + 28));
}

function setChartRows(chartId, rowCount) {
  const wrap = document.getElementById(chartId).parentElement;
  wrap.style.height = `${Math.min(1400, Math.max(360, rowCount * 28 + 80))}px`;
}

function selectedBarColor(selected, selectedColor) {
  return selected ? selectedColor : DESELECTED_BAR;
}

function setCanvasPointer(event, elements) {
  event.native.target.style.cursor = elements.length ? 'pointer' : 'default';
}

function updateSelectedCount(elementId, count) {
  document.getElementById(elementId).textContent = `${count} selected`;
}

async function loadLengths() {
  const data = await (await fetch(`/api/job/${JOB_ID}/lengths`)).json();
  if (!data.ready) return;
  const h = histogram(data.lengths, 50);
  if (lenChart) lenChart.destroy();
  lenChart = new Chart(document.getElementById('lenChart'), {
    type:'bar', data:{labels:h.labels, datasets:[{label:'Read count', data:h.counts}]},
    options:{
      maintainAspectRatio:false,
      scales:{x:{ticks:{autoSkip:true, maxTicksLimit:20}}},
      plugins:{zoom:{zoom:{wheel:{enabled:true}, pinch:{enabled:true}, mode:'x'}, pan:{enabled:true, mode:'x'}}}
    }
  });
}

async function submitLen() {
  await fetch(`/api/job/${JOB_ID}/submit_length_filter`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({min_len:+minLen.value, max_len:+maxLen.value})});
  watchStep('filter_barcodes');
}

async function loadStep4() {
  step4Data = await (await fetch(`/api/job/${JOB_ID}/barcode_step1`)).json();
  if (!step4Data.ready) return;
  renderStep4();
}

function renderStep4(){
  if (!step4Data || !step4Data.barcodes) return;
  const minCount = +document.getElementById('minCount').value;
  const maxBars = +document.getElementById('maxBars').value;
  const items = step4Data.barcodes.slice(0,maxBars);
  const labels = items.map(x=>x.barcode);
  selectedStep4 = new Set(items.filter(x=>x.count>=minCount).map(x=>x.barcode));
  updateSelectedCount('step4SelectedCount', selectedStep4.size);
  setChartRows('bcChart', items.length);
  if (bcChart) bcChart.destroy();
  bcChart = new Chart(document.getElementById('bcChart'), {
    type:'bar',
    data:{labels, datasets:[
      {label:'Forward %', data:items.map(x=>100*x.forward/step4Data.total), backgroundColor:items.map(x=>selectedBarColor(selectedStep4.has(x.barcode), SELECTED_FORWARD))},
      {label:'Reverse %', data:items.map(x=>100*x.reverse/step4Data.total), backgroundColor:items.map(x=>selectedBarColor(selectedStep4.has(x.barcode), SELECTED_REVERSE))}
    ]}, options:{
      indexAxis:'y',
      maintainAspectRatio:false,
      onClick(event, elements) {
        if (!elements.length) return;
        const barcode = items[elements[0].index].barcode;
        if (selectedStep4.has(barcode)) {
          selectedStep4.delete(barcode);
        } else {
          selectedStep4.add(barcode);
        }
        updateStep4Selection(items);
      },
      onHover: setCanvasPointer,
      scales:{
        x:{stacked:true},
        y:{
          stacked:true,
          afterFit(scale) { scale.width = sequenceAxisWidth(labels); },
          ticks:{autoSkip:false, font:{family:SEQUENCE_FONT}}
        }
      },
      plugins:{
        tooltip:{
          callbacks:{
            label(context) {
              const item = items[context.dataIndex];
              const isForward = context.datasetIndex === 0;
              const count = isForward ? item.forward : item.reverse;
              const pct = step4Data.total ? 100 * count / step4Data.total : 0;
              return `${context.dataset.label}: ${count} (${pct.toFixed(2)}%)`;
            },
            footer(context) {
              const item = items[context[0].dataIndex];
              return `Total: ${item.count} (${item.pct.toFixed(2)}%)`;
            }
          }
        }
      }
    }
  });
}

function updateStep4Selection(items) {
  bcChart.data.datasets[0].backgroundColor = items.map(x=>selectedBarColor(selectedStep4.has(x.barcode), SELECTED_FORWARD));
  bcChart.data.datasets[1].backgroundColor = items.map(x=>selectedBarColor(selectedStep4.has(x.barcode), SELECTED_REVERSE));
  updateSelectedCount('step4SelectedCount', selectedStep4.size);
  bcChart.update();
}

async function submitStep4() {
  const selected = Array.from(selectedStep4);
  await fetch(`/api/job/${JOB_ID}/submit_step4`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({selected})});
  watchStep('final_quant');
}

async function loadStep5() {
  finalData = await (await fetch(`/api/job/${JOB_ID}/final_quant`)).json();
  if (!finalData.ready) return;
  renderStep5();
}

function renderStep5() {
  if (!finalData || !finalData.rows) return;
  const minCount = +document.getElementById('finalMinCount').value;
  const items = finalData.rows;
  const labels = items.map(x=>x.key);
  selectedStep5 = new Set(items.filter(x=>x.count>=minCount).map(x=>x.key));
  updateSelectedCount('step5SelectedCount', selectedStep5.size);
  setChartRows('finalChart', items.length);
  if (finalChart) finalChart.destroy();
  const datasets = finalData.paired ? [
    {
      label:'Forward %',
      data:items.map(x=>finalData.total ? 100*x.forward/finalData.total : 0),
      backgroundColor:items.map(x=>selectedBarColor(selectedStep5.has(x.key), SELECTED_FORWARD))
    },
    {
      label:'Reverse %',
      data:items.map(x=>finalData.total ? 100*x.reverse/finalData.total : 0),
      backgroundColor:items.map(x=>selectedBarColor(selectedStep5.has(x.key), SELECTED_REVERSE))
    }
  ] : [
    {
      label:'%',
      data:items.map(x=>x.pct),
      backgroundColor:items.map(x=>selectedBarColor(selectedStep5.has(x.key), SELECTED_FINAL))
    }
  ];
  finalChart = new Chart(document.getElementById('finalChart'), {
    type:'bar',
    data:{labels, datasets},
    options:{
      indexAxis:'y',
      maintainAspectRatio:false,
      onClick(event, elements) {
        if (!elements.length) return;
        const key = items[elements[0].index].key;
        if (selectedStep5.has(key)) {
          selectedStep5.delete(key);
        } else {
          selectedStep5.add(key);
        }
        updateStep5Selection(items);
      },
      onHover: setCanvasPointer,
      scales:{
        x:{stacked:!!finalData.paired},
        y:{
          stacked:!!finalData.paired,
          afterFit(scale) { scale.width = sequenceAxisWidth(labels); },
          ticks:{autoSkip:false, font:{family:SEQUENCE_FONT}}
        }
      },
      plugins:{
        tooltip:{
          callbacks:{
            label(context) {
              const item = items[context.dataIndex];
              if (!finalData.paired) {
                return `Count: ${item.count} (${item.pct.toFixed(2)}%)`;
              }
              const count = context.datasetIndex === 0 ? item.forward : item.reverse;
              const pct = finalData.total ? 100 * count / finalData.total : 0;
              return `${context.dataset.label}: ${count} (${pct.toFixed(2)}%)`;
            },
            footer(context) {
              if (!finalData.paired) return '';
              const item = items[context[0].dataIndex];
              return `Total: ${item.count} (${item.pct.toFixed(2)}%)`;
            }
          }
        }
      }
    }
  });
}

function updateStep5Selection(items) {
  finalChart.data.datasets[0].backgroundColor = items.map(x=>selectedBarColor(selectedStep5.has(x.key), finalData.paired ? SELECTED_FORWARD : SELECTED_FINAL));
  if (finalData.paired && finalChart.data.datasets[1]) {
    finalChart.data.datasets[1].backgroundColor = items.map(x=>selectedBarColor(selectedStep5.has(x.key), SELECTED_REVERSE));
  }
  updateSelectedCount('step5SelectedCount', selectedStep5.size);
  finalChart.update();
}

async function submitStep5(){
  const selected = Array.from(selectedStep5);
  await fetch(`/api/job/${JOB_ID}/submit_step5`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({selected})});
  watchStep('split');
}

async function loadDownloads(){
  const el = document.getElementById('downloads');
  const data = await (await fetch(`/api/job/${JOB_ID}/downloads`)).json();
  if (!data.ready || !data.files.length) {
    el.innerHTML = `<p class="mb-0">No split FASTQ files are available yet.</p>`;
    return;
  }

  el.innerHTML = data.files.map(file => `
    <a class="btn btn-outline-primary me-2 mb-2 sequence-text" href="${file.url}">${file.name}</a>
  `).join('');
}

async function init() {
  const status = await fetchStatus();
  await renderCompleted(status);
  watchStep(firstActiveStep(status));
}

init();
</script>
</body>
</html>
